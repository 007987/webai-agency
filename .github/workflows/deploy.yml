name: Deploy to Hostinger

# Déclencheurs : à chaque push sur main + bouton manuel "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Évite les déploiements concurrents (annule le précédent run en cours).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js + cache npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Installation des dépendances (rapide grâce au cache)
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build statique Next.js (génère le dossier `out/`)
      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # 5️⃣ Déploiement FTP vers Hostinger
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/public_html/' }}
          # Ne supprime PAS les fichiers FTP qui ne sont plus dans `out/`
          # (passe à `true` plus tard quand tu veux un déploiement "miroir strict")
          dangerous-clean-slate: false
          # Exclusions : on n'upload pas les artefacts de dev
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
